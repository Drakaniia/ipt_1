<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#1e3a8a">
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    <title>Login | Buksu Student Portal</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Auth Pages Header -->
<div class="header">
  <div class="header-bar"></div>
  <div class="header-content">
    <div class="container">
      <div class="nav">
        <div class="logo-section">
          <img src="assets/img/bukidnon-state-university-logo.png" alt="Buksu Logo" class="logo" />
          <div class="jss2418" style="height: 32px; width: 1px;"></div>
          <div class="logo-text">
            <div class="logo-title">
              <span class="usep">Buksu </span> <span class="one">One</span>
            </div>
            <div class="logo-subtitle">Student Portal</div>
          </div>
        </div>
        <div class="nav-right">
          <div class="bsit-text">
            <div class="bsit-title">Bachelor of Science in</div>
            <div class="bsit-subtitle">Information Technology</div>
          </div>
          <div class="jss2418" style="height: 32px; width: 1px;"></div>
          <img src="assets/img/bsit-logo.png" alt="BSIT Logo" class="logo" />
        </div>
      </div>
    </div>
  </div>
</div>

    <main>
        <div class="container">
            <div class="d-flex justify-content-around align-items-end gap-5 flex-wrap-reverse flex-md-nowrap">
                <div class="d-flex flex-column pt-5">
                    <div class="d-flex flex-column align-items-start gap-2 mb-4 small position-relative">
                        <div class="d-flex align-items-center gap-3 text-body-secondary" id="themeToggle" style="cursor: pointer;">
                            <img src="assets/img/icon-dashboard.svg" alt="Theme" id="themeIcon" style="width: 20px; height: 20px;" />
                            <span id="themeText" class="ms-1">Light Mode</span>
                        </div>
                        <div class="help-link d-none d-md-block">
                            <span>Having trouble?</span>
                            <br>
                            <a href="#">Send us a message</a>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end align-items-end">
                        <img src="assets/img/login-cover.png" alt="Login Illustration" class="illustration">
                    </div>
                </div>

                <div class="flex-shrink-0">
                    <div class="login-card">
                        <h1 class="greeting">Hello there!</h1>
                        <p class="subtitle">Please login to get started.</p>
                        <div class="mb-3"></div>

                        <form id="loginForm" class="d-flex flex-column gap-3">
                            <div class="mb-3">
                                <input type="text" id="idNumber" class="form-control" placeholder="ID Number" required>
                            </div>

                            <div class="mb-3">
                                <input type="password" id="password" class="form-control" placeholder="Password" required>
                            </div>

                            <div class="d-flex align-items-center mb-3">
                                <label class="d-flex align-items-center gap-2 cursor-pointer small">
                                    <input type="checkbox" id="showPassword">
                                    <span>Show Password</span>
                                </label>
                            </div>

                            <button type="submit" class="btn btn-primary btn-login w-100">LOG ME IN</button>
                        </form>

                        <script>
                            document.getElementById('loginForm').addEventListener('submit', function(e) {
                                e.preventDefault();
                                const idNumber = document.getElementById('idNumber').value.trim();
                                const password = document.getElementById('password').value.trim();
                                
                                if (idNumber && password) {
                                    window.location.href = 'admin/dashboard.html';
                                }
                            });
                        </script>
                        <div class="mb-4"></div>

                        <a href="forgot-password.html" class="d-block text-center text-decoration-none mb-3 small">Forgot password?</a>

                        <p class="text-center small">Don't have an account? <a href="signup.html" class="text-decoration-none fw-semibold text-primary">Sign up</a></p>

                        <!-- Auth Pages Footer -->
<div class="auth-footer mt-5 text-center small">
  <p>Copyright © 2024. All Rights Reserved.</p>
  <p>
    <a href="#" class="text-decoration-none text-body-secondary">Terms of Use</a> | 
    <a href="#" class="text-decoration-none text-body-secondary">Privacy Policy</a>
  </p>
</div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="bootstrap/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
